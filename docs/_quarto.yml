project:
  type: default

# Single-document settings — pyMETRIC-UAV overview monograph.
# Build with:  quarto render pyMETRIC_UAV_overview.qmd --to pdf

format:
  pdf:
    documentclass: article
    geometry:
      - margin=1in
      - top=1in
      - bottom=1in
    fontsize: 11pt
    linestretch: 1.15
    colorlinks: true
    toc: true
    toc-depth: 3
    number-sections: true
    fig-pos: 'H'
    keep-tex: false
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true

execute:
  echo: true
  warning: false
